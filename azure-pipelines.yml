trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  # Mantemos o foco nos caminhos nativos dos seus arquivos
  solutionPath: '**/*.slnx'
  projectPath: '**/Simples.csproj'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
# 1. SUBSTITUIÇÃO: Removemos a tarefa antiga do NuGet e usamos o MSBuild nativo para o Restore
- task: MSBuild@1
  displayName: 'Restaurar Pacotes NuGet (via MSBuild)'
  inputs:
    solution: '$(solutionPath)'
    msbuildArguments: '/t:Restore' # Comando nativo que interpreta o .slnx e reconstrói as pastas de pacotes

# 2. Compilação oficial do Projeto WebForms
- task: VSBuild@1
  displayName: 'Compilar Projeto WebForms / .NET Framework'
  inputs:
    solution: '$(projectPath)'
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)"'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'
    clean: true

# 3. Publicação dos artefatos (arquivos .zip prontos para o IIS)
- task: PublishBuildArtifacts@1
  displayName: 'Publicar Artefato Gerado'
  inputs:
    PathtoPublish: '$(build.artifactStagingDirectory)'
    ArtifactName: 'drop-webforms'
    publishLocation: 'Container'
