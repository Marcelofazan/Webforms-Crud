trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  # Mapeamos o arquivo de solução (.slnx) para que o NuGet gerencie nativamente a pasta 'packages'
  solutionPath: '**/*.slnx'
  projectPath: '**/Simples.csproj'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:
# 1. Ajustado para usar uma versão existente e compatível no pool do Azure DevOps
- task: NuGetToolInstaller@1
  displayName: 'Garantir Instalador do NuGet (Versão 6.x)'
  inputs:
    versionSpec: '6.12.5' 

# 2. Restaurando pacotes baseando-se no arquivo de Solução (evita erros de caminho relativo)
- task: NuGetCommand@2
  displayName: 'Restaurar Pacotes NuGet via Solução'
  inputs:
    command: 'restore'
    restoreSolution: '$(solutionPath)'

# 3. Compilação do projeto WebForms via MSBuild focado no .csproj correto
- task: VSBuild@1
  displayName: 'Compilar Projeto WebForms / .NET Framework'
  inputs:
    solution: '$(projectPath)'
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:PackageLocation="$(build.artifactStagingDirectory)"'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'
    clean: true

# 4. Publicação dos artefatos
- task: PublishBuildArtifacts@1
  displayName: 'Publicar Artefato Gerado'
  inputs:
    PathtoPublish: '$(build.artifactStagingDirectory)'
    ArtifactName: 'drop-webforms'
    publishLocation: 'Container'
